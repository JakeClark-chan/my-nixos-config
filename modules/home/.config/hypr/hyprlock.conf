# Input field
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgba(200, 200, 200, 1.0)
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = <i><span foreground="##cdd6f4">🔒 Enter Password</span></i>
    hide_input = false
    rounding = 15
    check_color = rgba(204, 136, 34, 0)
    fail_color = rgba(204, 34, 34, 0)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -170
    halign = center
    valign = center
}

# "Click to unlock" instruction
label {
    monitor =
    text = Click or press Enter to unlock
    color = rgba(242, 243, 244, 0.50)
    font_size = 16
    font_family = Cascadia Code NF2
    position = 0, -250
    halign = center
    valign = center
}
