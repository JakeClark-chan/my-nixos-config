# Hyprlock Configuration
# Beautiful Hyprland-native lock screen

# General settings
general {
    disable_loading_bar = true
    grace = 2
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
    immediate_render = true
}

# Background with your wallpaper
background {
    monitor =
    path = /home/jc/nixos-config/shiho.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d, %Y")"
    color = rgba(242, 243, 244, 0.75)
    font_size = 22
    font_family = Cascadia Code NF2
    position = 0, 300
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(242, 243, 244, 0.75)
    font_size = 95
    font_family = Cascadia Code NF2
    position = 0, 200
    halign = center
    valign = center
}

