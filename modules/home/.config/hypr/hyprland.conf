# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

autogenerated = 0 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# Set laptop monitor to 1x scaling
monitor=eDP-1,1920x1080@144,0x0,1

# HDMI output configuration - Dynamic setup via submap
# Both HDMI outputs will be configured dynamically:
# - Mirror mode: duplicate laptop screen to HDMI at 1920x1080@60Hz
# - Extended mode: separate workspaces on HDMI at any resolution @60Hz
# Use Win+P to open display submap for configuration
monitor=HDMI-A-1,disable
monitor=HDMI-A-2,disable

# Fallback rule for any unspecified monitor
monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# Start wallpaper daemon with your custom background
# Option 1: Using swww (recommended for animated wallpapers)
exec-once = swww-daemon
# Because we are using swww, we don't need to set the wallpaper again here
# exec-once = sleep 1 && swww img @backgroundPath@

# Option 2: Using hyprpaper (alternative - comment out swww lines above if using this)
# exec-once = hyprpaper

# Start waybar (customizable top bar)
exec-once = waybar

# Start notification daemon
exec-once = swaync

# Start night light with 3100K color temperature using hyprsunset
exec-once = hyprsunset -t 3100

# Start fcitx5 input method
exec-once = fcitx5 -d

# Start nm-applet
exec-once = nm-applet --indicator

# Start flameshot
exec-once = flameshot

# Start polkit authentication agent (required for file operations and trash)
exec-once = lxqt-policykit-agent

# Start clipboard manager (cliphist)
exec-once = wl-paste --watch cliphist store

# exec-once = $terminal
# exec-once = nm-applet &


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

# Cursor configuration
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita

# Scaling environment variables - set to 1x
env = GDK_SCALE,1
env = QT_SCALE_FACTOR,1

# Firefox-specific DPI and font scaling
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DPI,96
env = MOZ_SCALE_FACTOR,1

# Nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

###################
### PERMISSIONS ###
###################

# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(00ff00ee) rgba(00cc44ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # POWER SAVING OPTIMIZATIONS:
    # - Blur and shadows are disabled to reduce GPU usage and extend battery life
    # - These can be re-enabled by setting blur:enabled = true and shadow:enabled = true
    
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false  # POWER SAVING: Disable shadows to reduce GPU usage
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false  # POWER SAVING: Disable blur effects to reduce GPU usage and save battery
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]

# HDMI MIRRORING MODE - No specific workspace binding needed
# All workspaces will be mirrored to HDMI displays when enabled
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Disable the anime mascot wallpapers to use custom wallpaper
    disable_hyprland_logo = true # Disable the random hyprland logo / anime girl background
    vfr = true # POWER SAVING: Variable Frame Rate - reduces frames when nothing is happening on screen
    
    # Additional power saving options
    enable_swallow = false # Disable window swallowing (slight power save)
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 2

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    # format: gesture = fingers, direction, action, options
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = sigmachip-usb-mouse
    sensitivity = -0.8
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# i3wm-style keybindings
# Win + D: Open application launcher (dmenu/wofi)
bind = $mainMod, D, exec, $menu

# Win + Enter: Open terminal
bind = $mainMod, Return, exec, $terminal

# Win + Shift + Q: Close/kill active window
bind = $mainMod SHIFT, Q, killactive,

# Win + E: Open file manager
bind = $mainMod, E, exec, $fileManager

# Win + Space: Toggle floating (i3wm style)
bind = $mainMod, space, togglefloating,

# Win + T: Change layout mode (similar to i3's layout toggle)
bind = $mainMod, T, exec, hyprctl keyword general:layout "$(hyprctl getoption general:layout | grep -q 'dwindle' && echo 'master' || echo 'dwindle')"

# Win + H/V: Toggle split direction (horizontal/vertical)
bind = $mainMod, H, togglesplit, # dwindle
bind = $mainMod SHIFT, H, layoutmsg, orientationcenter # master layout

# Win + Arrow keys: Move focus between windows
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Win + Shift + Arrow keys: Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, r

# Win + R: Enter resize mode
bind = $mainMod, R, submap, resize

# Resize mode keybindings
submap = resize
# Arrow keys to resize in resize mode
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
# Escape to exit resize mode
bind = , escape, submap, reset
submap = reset

# Win + Number keys: Switch to workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Win + Shift + Number keys: Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Additional useful bindings
# Clipboard manager (cliphist)
bind = $mainMod, V, exec, cliphist list | wofi --dmenu --pre-display-cmd "echo '%s' | cut -f 2" | cliphist decode | wl-copy

# Win + Shift + E: Exit/logout
bind = $mainMod SHIFT, E, exit,

# Win + F: Fullscreen
bind = $mainMod, F, fullscreen, 0

# Win + N: Toggle night light
bind = $mainMod, N, exec, pkill hyprsunset || hyprsunset -t 3100

# Win + M: Toggle waybar (like i3wm default)
bind = $mainMod, M, exec, pkill waybar || waybar

# Graceful shutdown/reboot keybindings
# Ctrl + Alt + Delete: Graceful shutdown
bind = CTRL ALT, Delete, exec, graceful-shutdown shutdown

# Ctrl + Alt + Shift + Delete: Graceful reboot
bind = CTRL ALT SHIFT, Delete, exec, graceful-shutdown reboot

# Win + L: Lock screen (beautiful lock screen with datetime)
bind = $mainMod, L, exec, lock-screen

# Win + Shift + L: Lock screen menu
bind = $mainMod SHIFT, L, exec, lock-screen menu

# Win + Shift + H: Apply Home Manager configuration
bind = $mainMod SHIFT, H, exec, apply-home-manager

# Win + Shift + /: Show Hyprland keybindings help (interactive cheatsheet)
bind = $mainMod SHIFT, slash, exec, hyprland-keybinds

# DISPLAY MANAGEMENT SUBMAP
# Win + P: Enter display management submap
bind = $mainMod, P, submap, display

# Win + Shift + P: Disable HDMI monitor (quick exit)
bind = $mainMod SHIFT, P, exec, hyprctl keyword monitor "HDMI-A-1,disable" && hyprctl keyword monitor "HDMI-A-2,disable" && notify-send "Display" "HDMI monitors disabled"

# Display management submap
submap = display

# Backtick (`): Switch to mirror mode
bind = , grave, exec, hyprctl keyword monitor "HDMI-A-1,1920x1080@60,0x0,1,mirror,eDP-1" && hyprctl keyword monitor "HDMI-A-2,1920x1080@60,0x0,1,mirror,eDP-1" && notify-send "Display" "Mirror mode enabled - laptop screen duplicated to HDMI"
# Number keys 1-0: Bind workspaces to HDMI (extended mode)
# 1: Workspace 1 on HDMI
bind = , 1, exec, hyprctl keyword monitor "HDMI-A-1,preferred@60,1920x0,1" && hyprctl keyword monitor "HDMI-A-2,preferred@60,1920x0,1" && hyprctl keyword workspace "1,monitor:HDMI-A-1,default:true" && notify-send "Display" "Workspace 1 bound to HDMI display"
# 2: Workspace 2 on HDMI
bind = , 2, exec, hyprctl keyword monitor "HDMI-A-1,preferred@60,1920x0,1" && hyprctl keyword monitor "HDMI-A-2,preferred@60,1920x0,1" && hyprctl keyword workspace "2,monitor:HDMI-A-1,default:true" && notify-send "Display" "Workspace 2 bound to HDMI display"
# 3: Workspace 3 on HDMI
bind = , 3, exec, hyprctl keyword monitor "HDMI-A-1,preferred@60,1920x0,1" && hyprctl keyword monitor "HDMI-A-2,preferred@60,1920x0,1" && hyprctl keyword workspace "3,monitor:HDMI-A-1,default:true" && notify-send "Display" "Workspace 3 bound to HDMI display"
# 4: Workspace 4 on HDMI
bind = , 4, exec, hyprctl keyword monitor "HDMI-A-1,preferred@60,1920x0,1" && hyprctl keyword monitor "HDMI-A-2,preferred@60,1920x0,1" && hyprctl keyword workspace "4,monitor:HDMI-A-1,default:true" && notify-send "Display" "Workspace 4 bound to HDMI display"
# 5: Workspace 5 on HDMI
bind = , 5, exec, hyprctl keyword monitor "HDMI-A-1,preferred@60,1920x0,1" && hyprctl keyword monitor "HDMI-A-2,preferred@60,1920x0,1" && hyprctl keyword workspace "5,monitor:HDMI-A-1,default:true" && notify-send "Display" "Workspace 5 bound to HDMI display"
# 6: Workspace 6 on HDMI
bind = , 6, exec, hyprctl keyword monitor "HDMI-A-1,preferred@60,1920x0,1" && hyprctl keyword monitor "HDMI-A-2,preferred@60,1920x0,1" && hyprctl keyword workspace "6,monitor:HDMI-A-1,default:true" && notify-send "Display" "Workspace 6 bound to HDMI display"
# 7: Workspace 7 on HDMI
bind = , 7, exec, hyprctl keyword monitor "HDMI-A-1,preferred@60,1920x0,1" && hyprctl keyword monitor "HDMI-A-2,preferred@60,1920x0,1" && hyprctl keyword workspace "7,monitor:HDMI-A-1,default:true" && notify-send "Display" "Workspace 7 bound to HDMI display"
# 8: Workspace 8 on HDMI
bind = , 8, exec, hyprctl keyword monitor "HDMI-A-1,preferred@60,1920x0,1" && hyprctl keyword monitor "HDMI-A-2,preferred@60,1920x0,1" && hyprctl keyword workspace "8,monitor:HDMI-A-1,default:true" && notify-send "Display" "Workspace 8 bound to HDMI display"
# 9: Workspace 9 on HDMI
bind = , 9, exec, hyprctl keyword monitor "HDMI-A-1,preferred@60,1920x0,1" && hyprctl keyword monitor "HDMI-A-2,preferred@60,1920x0,1" && hyprctl keyword workspace "9,monitor:HDMI-A-1,default:true" && notify-send "Display" "Workspace 9 bound to HDMI display"
# 0: Workspace 10 on HDMI
bind = , 0, exec, hyprctl keyword monitor "HDMI-A-1,preferred@60,1920x0,1" && hyprctl keyword monitor "HDMI-A-2,preferred@60,1920x0,1" && hyprctl keyword workspace "10,monitor:HDMI-A-1,default:true" && notify-send "Display" "Workspace 10 bound to HDMI display"

# Escape: Exit display submap
bind = , escape, submap, reset
# Reset submap
submap = reset

# Win + W: Change wallpaper (linear)
bind = $mainMod, W, exec, change-wallpaper

# Win + Shift + W: Change wallpaper (random)
bind = $mainMod SHIFT, W, exec, change-wallpaper random

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Win + Ctrl + Left/Right: Switch to previous/next workspace
bind = $mainMod CTRL, left, workspace, e-1
bind = $mainMod CTRL, right, workspace, e+1

# Win + Ctrl + Up/Down: Open and close Hyprspace overview
# bind = $mainMod CTRL, up, exec, hyprspace
# bind = $mainMod CTRL, down, exec, pkill hyprspace

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness with notifications
# Volume controls - 1% increments with notifications
bindel = ,XF86AudioRaiseVolume, exec, volume-control up
bindel = ,XF86AudioLowerVolume, exec, volume-control down
bindel = ,XF86AudioMute, exec, volume-control mute
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness controls - 5% increments with notifications  
bindel = ,XF86MonBrightnessUp, exec, brightness-control up
bindel = ,XF86MonBrightnessDown, exec, brightness-control down

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshot keybindings with Flameshot
# PrtSc: Open Flameshot launcher (interactive screenshot tool)
bind = , Print, exec, flameshot gui
# Win + PrtSc: Take full screen screenshot
bind = $mainMod, Print, exec, flameshot screen

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
